# 40kAI — конфиг ruff (линтер/форматтер Python).
# Консервативный набор: ловим реальные ошибки и сортируем импорты,
# не навязывая агрессивный рестайл всему легаси-коду.

target-version = "py312"
line-length = 120

# Не трогаем сгенерированное/служебное и архивы.
extend-exclude = [
    ".venv",
    "build",
    "dist",
    "artifacts",
    "runtime",
    "app/defold",
    "**/__pycache__",
]

[lint]
# E,W — pycodestyle; F — pyflakes (неиспользуемое/ошибки имён);
# I — isort (порядок импортов); UP — модернизация под py312; B — баги/ловушки.
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # длину строк не форсируем (legacy)
    "E741",  # допускаем короткие имена (l, I) в матча/движке
    "B008",  # вызовы в дефолтах аргументов встречаются в API
]

[lint.per-file-ignores]
# В тестах допускаем «звёздочные» импорты и неиспользуемые фикстуры.
"tests/**" = ["F401", "F403", "F405"]
# Точки входа часто делают `from x import *`.
"train.py" = ["F401", "F403", "F405"]
"eval.py" = ["F401", "F403", "F405"]
"play.py" = ["F401", "F403", "F405"]

[format]
quote-style = "double"
indent-style = "space"
